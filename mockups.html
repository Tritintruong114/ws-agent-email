<!DOCTYPE html>
<!--
  ENGINE (fixed). Copy verbatim to doc/ws-<name>/mockups.html; the ONLY thing
  you change per project is the DESIGN-TOKEN block below (override from the
  style reference). All screen CONTENT lives in the sibling mockups.data.js
  (window.WIREFRAME) — never inline screens here. Loaded via <script src> so
  the file still opens on double-click (file://, no fetch/CORS).
-->
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ws-email-agent · HTML prototype</title>
<style>
  /* ===================================================================
     DESIGN TOKENS — OVERRIDE FROM STYLE REFERENCE (the only per-project edit).
     Map the reference's tokens onto these names; keep names stable.
     =================================================================== */
  [data-theme="light"]{
    --canvas:#fff9f9; --card:#ffffff; --card-2:#f5eef0;
    --border:rgba(40,20,24,0.07); --border-strong:rgba(40,20,24,0.13);
    --ink:#1c1a1b; --ink-2:#6b6469; --ink-3:#a59ca1;
    --accent:#1c1c1e; --accent-h:#3a3a40;
    --accent-soft:rgba(28,28,30,0.06); --accent-soft-h:rgba(28,28,30,0.10); --accent-line:rgba(28,28,30,0.22);
    --ok:#3f9b63; --ok-soft:rgba(63,155,99,0.13);
    --warn:#d97706; --warn-soft:#fef3c7;
    --info:#5a93c9; --info-soft:rgba(90,147,201,.14);
    --bad:#dc2626; --bad-soft:rgba(220,38,38,.12);
    --fb:#3b6cc4; --fb-soft:#dceafe; --za:#0068ff; --za-soft:#e3eeff;
    --shadow:0 8px 30px 0 rgba(0,0,0,0.08); --shadow-sm:0 4px 20px 0 rgba(0,0,0,0.05);
    --radius:16px; --radius-sm:9px;
    --sans:'Inter', system-ui, -apple-system, sans-serif;
    --mono:'Inter', system-ui, -apple-system, sans-serif;
  }
  [data-theme="dark"]{
    --canvas:#15100f; --card:#241d1c; --card-2:#2e2624;
    --border:rgba(255,240,238,0.08); --border-strong:rgba(255,240,238,0.15);
    --ink:#f5ece9; --ink-2:#b3a8a5; --ink-3:#7a6f6c;
    --accent:#f0564d; --accent-h:#f56a62;
    --accent-soft:rgba(240,86,77,0.16); --accent-soft-h:rgba(240,86,77,0.24); --accent-line:rgba(240,86,77,0.32);
    --ok:#4faf76; --ok-soft:rgba(79,175,118,0.16);
    --warn:#e0a106; --warn-soft:rgba(224,161,6,.18);
    --info:#5e95cb; --info-soft:rgba(94,149,203,.18);
    --bad:#f0564d; --bad-soft:rgba(240,86,77,.16);
    --fb:#5e8fd6; --fb-soft:rgba(94,143,214,.18); --za:#4d8fff; --za-soft:rgba(77,143,255,.18);
    --shadow:0 8px 30px 0 rgba(0,0,0,0.45); --shadow-sm:0 4px 20px 0 rgba(0,0,0,0.28);
    --radius:16px; --radius-sm:9px;
    --sans:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:'Inter',ui-monospace,monospace;
  }

  /* ===== base ===== */
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);background:var(--canvas);color:var(--ink);
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:0;height:0} *{scrollbar-width:none}
  .app{max-width:1180px;margin:18px auto;padding:0 16px}

  /* ===== app shell ===== */
  .topbar{display:flex;align-items:center;gap:14px;background:var(--card);
    border:.5px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;
    padding:12px 18px;box-shadow:var(--shadow-sm)}
  .brand{font-weight:700;font-size:17px;letter-spacing:-.01em}
  .brand small{display:block;font-weight:400;font-size:11px;color:var(--ink-3);font-family:var(--mono)}
  .spacer{flex:1}
  .runswitch{display:inline-flex;border:.5px solid var(--border-strong);border-radius:999px;overflow:hidden}
  .runswitch button{border:0;background:transparent;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--ink-2)}
  .runswitch button.on{background:var(--bad-soft);color:var(--bad);font-weight:600}
  .runswitch button.run.on{background:var(--ok-soft);color:var(--ok)}
  .golive{background:var(--accent);color:#fff;border:0;border-radius:var(--radius-sm);
    padding:9px 16px;font-weight:600;cursor:pointer;transition:background .14s}
  .golive:hover{background:var(--accent-h)}
  .golive[disabled]{background:var(--border-strong);color:var(--ink-3);cursor:not-allowed}
  .themetoggle{border:.5px solid var(--border-strong);background:transparent;border-radius:999px;
    width:34px;height:34px;cursor:pointer;font-size:15px;color:var(--ink-2)}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--card-2);display:grid;place-items:center;font-size:14px}

  /* top tabs */
  .tabbar{display:flex;gap:4px;background:var(--card);border:.5px solid var(--border);border-top:0;
    padding:6px 10px;box-shadow:var(--shadow-sm);flex-wrap:wrap}
  .tabbar button{border:0;background:transparent;padding:9px 14px;cursor:pointer;font-size:13.5px;
    color:var(--ink-2);border-radius:999px;font-weight:500;transition:all .14s}
  .tabbar button:hover{background:var(--card-2)}
  .tabbar button.active{color:var(--accent);background:var(--accent-soft);border:.5px solid var(--accent-line);font-weight:600}

  /* stage */
  .stage{background:var(--canvas);border:.5px solid var(--border);border-top:0;
    border-radius:0 0 var(--radius) var(--radius);padding:16px;box-shadow:var(--shadow-sm);min-height:520px}
  .stateswitch{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .stateswitch button{border:.5px solid var(--border-strong);background:transparent;border-radius:999px;
    padding:6px 13px;font-size:12.5px;cursor:pointer;color:var(--ink-2);transition:all .14s}
  .stateswitch button.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-line);font-weight:600}
  /* state switcher as a floating control drawer (bottom-right) */
  .statedrawer{position:fixed;right:18px;bottom:18px;z-index:50;width:max-content;max-width:300px;
    background:var(--card);border:.5px solid var(--border-strong);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:10px 12px}
  .statedrawer .dh{display:flex;align-items:center;justify-content:space-between;gap:14px;cursor:pointer;
    font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:600;font-family:var(--mono);user-select:none}
  .statedrawer .dh .dt{font-size:13px;color:var(--ink-2)}
  .statedrawer .stateswitch{flex-direction:column;flex-wrap:nowrap;gap:6px;margin:10px 0 0}
  .statedrawer .stateswitch button{text-align:left}
  .statedrawer.collapsed{padding:8px 12px}
  .statedrawer.collapsed .stateswitch{display:none}
  .screen{display:none}
  .screen.show{display:block;animation:fade .22s cubic-bezier(.22,1,.36,1)}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ===== primitives (restyle from reference, keep names) ===== */
  .card{background:var(--card);border:.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-sm)}
  .card h3{margin:0 0 10px;font-size:14px;display:flex;align-items:center;gap:8px}
  .grid2{display:grid;grid-template-columns:1.05fr .95fr;gap:14px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .gridkpi{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .muted{color:var(--ink-2)} .small{font-size:12px}
  .row{display:flex;align-items:center;gap:10px} .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .gap{height:10px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:.5px solid var(--border-strong);
    background:var(--card);color:var(--ink);border-radius:var(--radius-sm);padding:8px 14px;cursor:pointer;
    font-size:13.5px;font-weight:600;font-family:var(--sans);transition:all .14s}
  .btn:hover{background:var(--card-2)}
  .btn.pri{background:var(--accent);color:#fff;border-color:transparent} .btn.pri:hover{background:var(--accent-h)}
  .btn.soft{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-line)}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--ink-2)}
  .btn.warn{background:var(--warn-soft);border-color:transparent;color:var(--warn)}
  .btn.big{display:block;width:100%;text-align:center;padding:12px;font-size:15px}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:2px 9px;height:22px;border-radius:999px;
    font-weight:600;font-family:var(--mono);letter-spacing:.02em;color:var(--ink-2);background:var(--card-2)}
  .p-ok{background:var(--ok-soft);color:var(--ok)} .p-warn{background:var(--warn-soft);color:var(--warn)}
  .p-blue{background:var(--info-soft);color:var(--info)} .p-grey{background:var(--card-2);color:var(--ink-3)} .p-bad{background:var(--bad-soft);color:var(--bad)}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:6px;background:var(--accent-soft);color:var(--accent);font-weight:600}
  .bd-fb{background:var(--fb-soft);color:var(--fb)} .bd-za{background:var(--za-soft);color:var(--za)}
  .kpi{background:var(--card-2);border:.5px solid var(--border);border-radius:12px;padding:11px 13px}
  .kpi .lab{font-size:11px;color:var(--ink-3)} .kpi .val{font-size:22px;font-weight:700;margin-top:2px;letter-spacing:-.02em}
  .kpi .sub{font-size:11px;color:var(--ink-3);margin-top:2px} .kpi.dim{opacity:.45}
  .up{color:var(--ok);font-size:12px;font-weight:600}
  .spark{height:22px;display:flex;align-items:flex-end;gap:2px;margin-top:4px}
  .spark i{width:7px;background:var(--accent);border-radius:2px 2px 0 0;display:block}
  .step{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px dashed var(--border-strong)}
  .step:last-child{border-bottom:0} .step .mk{width:20px;text-align:center} .step .lb{flex:1} .step .req{color:var(--bad);font-weight:700}
  .progbar{height:8px;background:var(--card-2);border-radius:99px;overflow:hidden;margin:6px 0 10px}
  .progbar i{display:block;height:100%;background:var(--accent)}
  .locked{background:var(--card-2);border:.5px dashed var(--border-strong);border-radius:var(--radius-sm);padding:9px 11px;color:var(--ink-2);font-size:13px}
  .preview-note{background:var(--card-2);border-radius:var(--radius-sm);padding:7px 11px;color:var(--ink-2);font-size:12px;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:.5px solid var(--border)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:600;font-family:var(--mono)}
  tr:hover td{background:var(--card-2)}
  .tbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
  .selbox{border:.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:7px 11px;background:var(--card);font-size:13px;color:var(--ink)}
  .pager{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;color:var(--ink-3);font-size:12px}
  .bulkbar{margin-top:10px;background:var(--accent-soft);border:.5px solid var(--accent-line);border-radius:12px;padding:10px 12px;display:flex;gap:10px;align-items:center}
  .conv{display:grid;grid-template-columns:300px 1fr;background:var(--card);border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
  .conv .list{border-right:.5px solid var(--border);background:var(--card-2)}
  .conv .lhead{padding:10px;border-bottom:.5px solid var(--border);display:flex;flex-direction:column;gap:8px}
  .convitem{padding:10px 12px;border-bottom:.5px solid var(--border);cursor:pointer}
  .convitem.sel{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
  .convitem .q{font-size:13px;color:var(--ink-3);margin:3px 0}
  .detail{padding:14px}
  .bubbles{background:var(--card-2);border:.5px solid var(--border);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px;margin:10px 0}
  .bub{max-width:78%;padding:8px 12px;border-radius:13px;font-size:13px}
  .bub.cust{background:var(--card);border:.5px solid var(--border);align-self:flex-start} .bub.agent{background:var(--accent-soft);align-self:flex-end}
  .sysline{text-align:center;font-size:11px;color:var(--ink-3);margin:2px 0}
  .input{display:flex;gap:8px;margin-top:8px} .input input{flex:1;border:.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:9px 11px;background:var(--card);color:var(--ink)}
  .suggest{background:var(--warn-soft);border:.5px solid transparent;border-radius:12px;padding:10px 12px;margin:8px 0}
  .empty{display:grid;place-items:center;text-align:center;color:var(--ink-3);min-height:240px} .empty .big{font-size:38px;margin-bottom:8px}
  .modalbox{max-width:520px;margin:10px auto;background:var(--card);border:.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
  .modalbox .mh{padding:13px 16px;border-bottom:.5px solid var(--border);font-weight:700;display:flex;justify-content:space-between}
  .modalbox .mb{padding:14px 16px} .modalbox .mf{padding:12px 16px;border-top:.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
  .field{margin-bottom:10px} .field label{display:block;font-size:12px;color:var(--ink-2);margin-bottom:4px}
  .field input,.field select,.field textarea{width:100%;border:.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:9px 11px;font-size:13px;font-family:inherit;background:var(--card);color:var(--ink)}
  textarea{min-height:80px;resize:vertical}
  .dropzone{border:2px dashed var(--border-strong);border-radius:12px;padding:22px;text-align:center;color:var(--ink-3);background:var(--card-2)}
  .qr{width:150px;height:150px;background:repeating-linear-gradient(45deg,var(--ink) 0 6px,var(--card) 6px 12px);border:6px solid var(--card);border-radius:8px;box-shadow:0 0 0 1px var(--border);margin:auto}
  .qrwrap{text-align:center;padding:10px}
  .subtabs{display:flex;gap:4px;border-bottom:.5px solid var(--border);margin-bottom:12px}
  .subtabs button{border:0;background:transparent;padding:8px 12px;cursor:pointer;color:var(--ink-2);border-bottom:2px solid transparent;font-size:13px}
  .subtabs button.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .togglebox{display:flex;justify-content:space-between;align-items:center;border:.5px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:8px;background:var(--card)}
  .sw{width:38px;height:22px;border-radius:99px;background:var(--border-strong);position:relative;cursor:pointer;flex:none} .sw.on{background:var(--accent)}
  .sw i{position:absolute;top:2.5px;left:2.5px;width:17px;height:17px;border-radius:50%;background:#fff;transition:left .18s cubic-bezier(.22,1,.36,1);box-shadow:0 1px 2px rgba(0,0,0,.2)} .sw.on i{left:18.5px}
  .note{font-size:12px;color:var(--ink-2);margin-top:8px} .legend{font-size:11px;color:var(--ink-3);margin-top:8px}
  .filterchip{border:.5px solid var(--border-strong);background:transparent;border-radius:999px;padding:5px 12px;font-size:12.5px;cursor:pointer;color:var(--ink-2)}
  .filterchip.on{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent);font-weight:600}
  .kbrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border)} .kbrow:last-child{border-bottom:0}
  .kbrow .ic{font-size:16px;width:22px;text-align:center} .kbrow .tx{flex:1}
  h2.t{margin:2px 0 12px;font-size:16px;letter-spacing:-.01em}
  footer.legend2{margin:14px 4px;color:var(--ink-3);font-size:12px}
  .loaderr{max-width:600px;margin:60px auto;text-align:center;color:var(--ink-2)}
</style>
</head>
<body>
<div class="app" id="app"></div>

<!-- CONTENT lives here (one text file, edited per use-case) -->
<script src="mockups.data.js"></script>

<!-- ENGINE (fixed) — builds shell + tabs + state switchers from window.WIREFRAME -->
<script>
(function(){
  const W = window.WIREFRAME;
  const app = document.getElementById('app');
  if(!W || !W.tabs || !W.screens){
    app.innerHTML = '<div class="loaderr"><h2>⚠ Thiếu nội dung</h2><p>Không tìm thấy <code>window.WIREFRAME</code>. Mở file cạnh <code>mockups.data.js</code>.</p></div>';
    return;
  }
  const m = W.meta || {};
  // topbar
  const tb = document.createElement('div'); tb.className='topbar';
  let topRight = '<button class="themetoggle" id="themeBtn" title="Sáng/tối">◐</button>'
               + '<div class="avatar">'+(m.avatar||'🏪')+'</div>';
  if(m.runSwitch){
    topRight = '<div class="runswitch"><button class="on" id="rs-rest">'+(m.restLabel||'⏸ Nghỉ')+'</button>'
             + '<button class="run" id="rs-run">'+(m.runLabel||'▶ Trực')+'</button></div>'
             + (m.goLiveLabel?'<button class="golive" disabled>'+m.goLiveLabel+'</button>':'')
             + topRight;
  }
  tb.innerHTML = '<div class="brand">'+(m.title||'Wireframe')
    + (m.subtitle?'<small>'+m.subtitle+'</small>':'')+'</div><div class="spacer"></div>'+topRight;
  app.appendChild(tb);
  // tabbar
  const bar = document.createElement('div'); bar.className='tabbar';
  W.tabs.forEach((t,i)=>{
    const b=document.createElement('button'); b.dataset.tab=t.id; b.textContent=t.label;
    if(i===0) b.classList.add('active'); bar.appendChild(b);
  });
  app.appendChild(bar);
  // stage
  const stage=document.createElement('div'); stage.className='stage';
  W.tabs.forEach((t,ti)=>{
    const def=W.screens[t.id]||{states:[],html:{}};
    const sec=document.createElement('section'); sec.dataset.pane=t.id; if(ti>0) sec.hidden=true;
    const sw=document.createElement('div'); sw.className='stateswitch';
    (def.states||[]).forEach((s,si)=>{
      const b=document.createElement('button'); b.dataset.s=s.id; b.textContent=s.label;
      if(si===0) b.classList.add('active'); sw.appendChild(b);
    });
    if((def.states||[]).length>1){
      const dr=document.createElement('div'); dr.className='statedrawer';
      dr.innerHTML='<div class="dh"><span>◧ Trạng thái màn hình</span><span class="dt">▾</span></div>';
      dr.appendChild(sw); sec.appendChild(dr);
    }
    (def.states||[]).forEach((s,si)=>{
      const sc=document.createElement('div'); sc.className='screen'+(si===0?' show':'');
      sc.dataset.screen=s.id; sc.innerHTML=(def.html&&def.html[s.id])||'';
      sec.appendChild(sc);
    });
    stage.appendChild(sec);
  });
  app.appendChild(stage);
  // footer
  const f=document.createElement('footer'); f.className='legend2';
  f.innerHTML='Wireframe interactive · nguồn: <code>'+(m.source||'mockups.md')
    +'</code> · click tab + state để duyệt · style ref: <code>'+(m.styleRef||'—')+'</code>';
  app.appendChild(f);

  // wiring
  bar.addEventListener('click',e=>{
    const b=e.target.closest('button[data-tab]'); if(!b)return;
    [...bar.children].forEach(x=>x.classList.toggle('active',x===b));
    stage.querySelectorAll('section[data-pane]').forEach(s=>s.hidden=s.dataset.pane!==b.dataset.tab);
  });
  stage.querySelectorAll('.stateswitch').forEach(g=>{
    g.addEventListener('click',e=>{
      const b=e.target.closest('button[data-s]'); if(!b)return;
      [...g.children].forEach(x=>x.classList.toggle('active',x===b));
      g.closest('section').querySelectorAll('.screen')
        .forEach(sc=>sc.classList.toggle('show',sc.dataset.screen===b.dataset.s));
    });
  });
  stage.querySelectorAll('.statedrawer .dh').forEach(h=>{
    h.addEventListener('click',()=>{
      const d=h.closest('.statedrawer'); d.classList.toggle('collapsed');
      h.querySelector('.dt').textContent=d.classList.contains('collapsed')?'▸':'▾';
    });
  });
  document.getElementById('themeBtn').onclick=()=>{
    const r=document.documentElement; r.dataset.theme=r.dataset.theme==='dark'?'light':'dark';
  };
  const rest=document.getElementById('rs-rest'),run=document.getElementById('rs-run');
  if(rest&&run){ rest.onclick=()=>{rest.classList.add('on');run.classList.remove('on')};
                 run.onclick=()=>{run.classList.add('on');rest.classList.remove('on')}; }
})();
</script>
</body>
</html>
